<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>暴打三兄弟</title>
  <style>
    :root{
      --ink:#24201c; --wall:#d9d2c7; --wall2:#c7beb3; --floor:#9a6b4c;
      --desk:#8b5a3b; --desk2:#6d432b; --metal:#56606b; --glass:#b8d7e8;
      --paper:#f7f3e8; --skin:#f6db91; --cheek:#df8a58; --nose:#de7547;
      --shadow:rgba(0,0,0,.22); --red:#e65f48; --orange:#f08a43;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:manipulation;background:#222;font-family:ui-rounded,"SF Pro Rounded","PingFangSC-Semibold",sans-serif}.phone{width:min(100vw,440px);height:min(100vh,900px);max-height:100vh;position:relative;overflow:hidden;background:linear-gradient(var(--wall) 0 53%, #b88763 53% 100%);box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 20px 60px rgba(0,0,0,.3)}
    
    /* 更真实一点的办公室 */
    .ceiling{position:absolute;left:0;right:0;top:0;height:8%;background:#eee8df;border-bottom:2px solid rgba(0,0,0,.08)}
    .light{position:absolute;top:2%;left:50%;transform:translateX(-50%);width:44%;height:18px;border-radius:20px;background:#fff9df;box-shadow:0 0 28px rgba(255,244,188,.55)}
    .back-wall{position:absolute;left:0;right:0;top:8%;height:45%;background:linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px) 0 0/55px 55px,linear-gradient(var(--wall),var(--wall2));border-bottom:3px solid rgba(0,0,0,.06)}
    .window{position:absolute;top:13%;left:7%;width:34%;height:20%;border:7px solid #f4efe6;background:linear-gradient(150deg,#a8d1e5,#d9eff9);box-shadow:0 10px 18px rgba(0,0,0,.12)}
    .window:before,.window:after{content:"";position:absolute;background:#f4efe6}.window:before{left:50%;top:0;width:5px;height:100%}.window:after{top:50%;left:0;height:5px;width:100%}
    .blind{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,.7);box-shadow:0 18px 0 rgba(255,255,255,.55),0 36px 0 rgba(255,255,255,.45),0 54px 0 rgba(255,255,255,.35)}
    .poster{position:absolute;right:7%;top:14%;width:33%;height:18%;background:#f8f3e8;border:6px solid #4f5963;box-shadow:0 9px 16px rgba(0,0,0,.14);padding:10px;text-align:center;font-weight:100;color:#333;font-size:11px;line-height:1.3}
    .poster b{display:block;color:var(--red);font-size:1.4em;margin-bottom:3px}.poster:after{content:"APPROVED?";position:absolute;right:8px;bottom:7px;color:#d05041;font-size:10px;transform:rotate(-18deg)}
    .cabinet{position:absolute;right:4%;bottom:32%;width:70px;height:148px;background:#707b86;border-radius:4px;box-shadow:0 10px 20px rgba(0,0,0,.2)}
    .drawer{height:33.33%;border-bottom:2px solid #58616b;position:relative}.drawer:after{content:"";position:absolute;top:16px;left:22px;width:26px;height:5px;border-radius:9px;background:#cfd6dc;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
    .plant{position:absolute;left:1%;bottom:33%;width:72px;height:130px;opacity:.95}.leaf{position:absolute;bottom:42px;width:25px;height:75px;background:#4b8f5b;border-radius:80% 20% 80% 20%;transform-origin:50% 85%;box-shadow:inset -1px -1px 3px rgba(0,0,0,.2)}.leaf.l1{left:8px;transform:rotate(-28deg)}.leaf.l2{left:24px;transform:rotate(0)}.leaf.l3{left:40px;transform:rotate(28deg)}.pot{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:38px;height:32px;background:linear-gradient(135deg,#b8956a,#8b6f47);border-radius:0 0 16px 16px;border:2px solid #6d5a3d;box-shadow:inset 0 2px 4px rgba(0,0,0,.3), 0 4px 8px rgba(0,0,0,.2)}
    .floor{position:absolute;left:-12%;right:-12%;bottom:-3%;height:47%;background:repeating-linear-gradient(90deg,#a87551 0 42px,#956747 42px 84px);transform:perspective(260px) rotateX(18deg);transform-origin:center bottom}
    .rug{position:absolute;left:18%;right:18%;bottom:6%;height:14%;background:rgba(63,76,91,.22);border-radius:50%}

    .hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;z-index:10}.pill{background:rgba(255,255,255,.86);border:1px solid rgba(0,0,0,.08);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:#333;backdrop-filter:blur(10px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .title-card,.end-card{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;background:linear-gradient(135deg,rgba(0,0,0,.7),rgba(0,0,0,.5));backdrop-filter:blur(8px);color:#fff;font-weight:500}
    .title-card h1,.end-card h1{font-size:3.2em;margin:0 0 12px;line-height:1.2;font-weight:900;text-shadow:0 4px 8px rgba(0,0,0,.4)}.subtitle{font-size:14px;line-height:1.6;color:rgba(255,255,255,.8);margin-bottom:24px}
    button{background:linear-gradient(135deg,var(--red),var(--orange));border:none;color:#fff;padding:12px 28px;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 6px 16px rgba(230,95,72,.3);transition:all .2s;text-transform:uppercase;letter-spacing:.5px}button:active{transform:scale(.96);box-shadow:0 3px 8px rgba(230,95,72,.2)}
    .hidden{display:none!important}

    .game{position:absolute;inset:0;padding-top:27%}.desks{position:absolute;left:0;right:0;bottom:7%;height:66%;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);gap:2%;padding:3% 4%;z-index:1}
    .hole{position:relative;width:100%;height:100%;background:linear-gradient(135deg,#5a4a3a,#3d2e1f);border-radius:50%;box-shadow:inset 0 8px 16px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.2);cursor:pointer;overflow:hidden}
    .hole:after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 30%,rgba(255,255,255,.1),transparent 60%);border-radius:50%}

    .bro{position:absolute;bottom:24%;width:min(34vw,140px);height:min(42vw,172px);transform:translateY(128%);transition:transform .16s cubic-bezier(.2,1.5,.5,1),filter .08s;z-index:3;display:flex;align-items:flex-end;justify-content:center}.bro.up{transform:translateY(0)}.bro.hit{animation:hitBro .2s ease-out;filter:brightness(.8)}
    /* 按你发的参考图：椭圆脸、长鼻子、黑边手绘感、腮红、小耳朵、斜刘海 */
    .head{position:relative;width:74%;height:72%;background:var(--skin);border:3px solid #1e2119;border-radius:48% 46% 44% 42%/56% 54% 45% 44%;z-index:2;box-shadow:0 8px 0 rgba(0,0,0,.12);overflow:hidden}
    .head:before{content:"";position:absolute;top:0;left:0;right:0;height:28%;background:linear-gradient(90deg,transparent 0%,#1e2119 8%,#1e2119 18%,transparent 28%);clip-path:polygon(0 0,100% 0,70% 100%,30% 100%);opacity:.7}
    .head:after{content:"";position:absolute;top:8%;right:12%;width:16px;height:20px;background:#f6db91;border:2px solid #1e2119;border-radius:50%;z-index:-1}
    .eye{position:absolute;top:32%;width:16px;height:18px;background:#1e2119;border-radius:50%;z-index:1}.eye.left{left:18%}.eye.right{right:18%}
    .eye:before{content:"";position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;top:4px;left:4px}
    .cheek{position:absolute;top:44%;width:12px;height:10px;background:var(--cheek);border-radius:50%;opacity:.6;filter:blur(2px)}.cheek.left{left:12%}.cheek.right{right:12%}
    .nose{position:absolute;top:38%;left:50%;transform:translateX(-50%);width:14px;height:22px;background:var(--nose);border:2px solid #1e2119;border-radius:0 0 8px 8px}
    .mouth{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);width:24px;height:8px;background:#d9534f;border:2px solid #1e2119;border-radius:50%;border-top:none}
    .tag{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;z-index:10;text-shadow:0 1px 2px rgba(0,0,0,.3)}
    .tag:after{content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid #333}
    .damage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,.9);padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700;color:#333;pointer-events:none;z-index:5}

    .hammer{position:absolute;left:0;top:0;width:92px;height:92px;z-index:25;pointer-events:none;transform:translate(-999px,-999px) rotate(-28deg);transform-origin:72% 78%;filter:drop-shadow(0 8px 12px rgba(0,0,0,.3))}
    .hammer .handle{position:absolute;left:49px;top:28px;width:15px;height:68px;background:linear-gradient(90deg,#7a4a28,#b27645,#6d3e22);border:3px solid #241a12;border-radius:10px;transform:rotate(-8deg)}
    .hammer .head{position:absolute;left:18px;top:8px;width:62px;height:34px;background:linear-gradient(#aeb6bd,#6f7881);border:3px solid #222;border-radius:9px;transform:rotate(36deg);box-shadow:inset 0 2px 4px rgba(255,255,255,.2), inset 0 -2px 4px rgba(0,0,0,.3)}
    .hammer .head:before,.hammer .head:after{content:"";position:absolute;top:6px;width:15px;height:18px;background:#818a92;border:3px solid #222;border-radius:6px;box-shadow:inset 0 1px 2px rgba(255,255,255,.1)}
    .hammer .head:before{left:-15px}.hammer .head:after{right:-15px}
    .hammer.swing{animation:hammerSwing .2s ease-out}
    @keyframes hammerSwing{0%{transform:var(--hammer-pos) rotate(-48deg) scale(1.05)}55%{transform:var(--hammer-pos) rotate(18deg) scale(.98)}100%{transform:var(--hammer-pos) rotate(-28deg) scale(1)}}
    .smash{position:absolute;z-index:24;pointer-events:none;width:78px;height:78px;transform:translate(-50%,-50%);animation:smash .32s ease-out forwards}
    .smash:before{content:"💥";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;filter:drop-shadow(2px 2px white)}
    @keyframes smash{to{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
    .pop{position:absolute;z-index:20;font-weight:1000;font-size:24px;color:var(--red);text-shadow:2px 2px 0 #fff;pointer-events:none;animation:floatup .55s ease-out forwards}@keyframes floatup{to{transform:translate(-50%,-50%) translateY(-80px);opacity:0}}
    @keyframes hitBro{0%{transform:translateY(0) scale(1)}50%{transform:translateY(8px) scale(.95)}100%{transform:translateY(0) scale(1)}}
  </style>
</head>
<body>
  <main class="phone" id="phone">
    <div class="ceiling"><div class="light"></div></div><div class="back-wall"></div>
    <div class="window"><div class="blind"></div></div><div class="poster"><b>NO</b>LAST MINUTE<br/>REVISION</div>
    <div class="cabinet"><div class="drawer"></div><div class="drawer"></div><div class="drawer"></div></div>
    <div class="plant"><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="pot"></div></div>
    <div class="hud"><div class="pill">分数 <span id="score">0</span></div><div class="pill">时间 <span id="time">30</span>s</div><div class="pill">连击 <span id="combo">0</span></div></div>
    <section class="game"><div class="floor"></div><div class="rug"></div><div class="desks" id="desks"></div></section>
    <div class="hammer" id="hammer"><div class="handle"></div><div class="head"></div></div>
    <section class="title-card" id="start"><h1>暴打<br/>三兄弟</h1><div class="subtitle">真实办公室版。三兄弟会从工位后面冒出来，拿大锤子敲他们！</div><button id="startBtn">开始游戏</button></section>
    <section class="end-card hidden" id="end"><h1>下班！</h1><div class="subtitle" id="result"></div><button id="restartBtn">再暴打一次</button></section>
  </main>
  <script>
    const hammer=document.getElementById('hammer'),desks=document.getElementById('desks'),scoreEl=document.getElementById('score'),timeEl=document.getElementById('time'),comboEl=document.getElementById('combo'),startCard=document.getElementById('start'),endCard=document.getElementById('end'),phone=document.getElementById('phone');
    const roasts=['改需求!','Quick call?','画大饼!','已读不回!','+1 revision','下班啦!'];let score=0,combo=0,timeLeft=30,running=false,gameTimer,spawnTimer;const bros=[];
    function makeBro(i){const hole=document.createElement('div');hole.className='hole';hole.innerHTML=`<div class="bro b${(i%3)+1}" data-damage="0"><div class="tag">${['大哥','二哥','三弟'][i%3]}</div><div class="head"><div class="eye left"></div><div class="eye right"></div><div class="cheek left"></div><div class="cheek right"></div><div class="nose"></div><div class="mouth"></div></div></div>`;const bro=hole.querySelector('.bro');bro.addEventListener('click',e=>hitBro(e,bro));desks.appendChild(hole);bros.push(bro);}
    for(let i=0;i<6;i++)makeBro(i);
    function startGame(){score=0;combo=0;timeLeft=30;running=true;scoreEl.textContent=score;comboEl.textContent=combo;timeEl.textContent=timeLeft;startCard.classList.add('hidden');endCard.classList.add('hidden');bros.forEach(b=>b.classList.remove('up','hit'));gameTimer=setInterval(()=>{timeLeft--;timeEl.textContent=timeLeft;if(timeLeft<=0)endGame();},1000);spawnLoop();}
    function spawnLoop(){if(!running)return;const available=bros.filter(b=>!b.classList.contains('up'));const count=Math.random()>.72?2:1;for(let i=0;i<count&&available.length;i++){const bro=available.splice(Math.floor(Math.random()*available.length),1)[0];showBro(bro);}spawnTimer=setTimeout(spawnLoop,Math.max(280,600-score*2+Math.random()*400));}
    function showBro(bro){bro.classList.add('up');const stay=Math.max(520,1200-score*5+Math.random()*500);setTimeout(()=>{if(running&&bro.classList.contains('up')&&!bro.classList.contains('hit')){bro.classList.remove('up');combo=0;comboEl.textContent=combo;}},stay);}
    function hitBro(e,bro){showHammer(e.clientX,e.clientY);if(!running||!bro.classList.contains('up')||bro.classList.contains('hit'))return;combo++;score+=10+Math.min(combo*2,20);scoreEl.textContent=score;comboEl.textContent=combo;bro.classList.add('hit');popText(e.clientX,e.clientY,roasts[Math.floor(Math.random()*roasts.length)]);const smash=document.createElement('div');smash.className='smash';smash.style.left=e.clientX-phone.getBoundingClientRect().left+'px';smash.style.top=e.clientY-phone.getBoundingClientRect().top+'px';phone.appendChild(smash);setTimeout(()=>smash.remove(),320);setTimeout(()=>{bro.classList.remove('up','hit');combo=0;comboEl.textContent=combo;},400);}
    function showHammer(x,y){const rect=phone.getBoundingClientRect();const px=x-rect.left-28,py=y-rect.top-72;hammer.style.setProperty('--hammer-pos',`translate(${px}px,${py}px)`);hammer.style.animation='none';setTimeout(()=>{hammer.style.animation='';hammer.classList.add('swing');},10);setTimeout(()=>hammer.classList.remove('swing'),200);}
    function popText(x,y,text){const p=document.createElement('div'),rect=phone.getBoundingClientRect();p.className='pop';p.textContent=text;p.style.left=x-rect.left-35+'px';p.style.top=y-rect.top-40+'px';phone.appendChild(p);setTimeout(()=>p.remove(),550);}
    function endGame(){running=false;clearInterval(gameTimer);clearTimeout(spawnTimer);bros.forEach(b=>b.classList.remove('up','hit'));result.innerHTML=`你的最终分数是 <b>${score}</b><br/>${score>500?'你是暴打大师！🏆':score>300?'暴打好手！💪':score>100?'还不错！👍':'再来一次？'}`;;endCard.classList.remove('hidden');}
    document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',startGame);
  </script>
</body>
</html>
