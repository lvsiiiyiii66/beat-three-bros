<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>暴打三兄弟</title>
  <style>
    :root{
      --ink:#24201c; --wall:#d9d2c7; --wall2:#c7beb3; --floor:#9a6b4c;
      --desk:#8b5a3b; --desk2:#6d432b; --metal:#56606b; --glass:#b8d7e8;
      --paper:#f7f3e8; --skin:#f6db91; --cheek:#df8a58; --nose:#de7547;
      --shadow:rgba(0,0,0,.22); --red:#e65f48; --orange:#f08a43; --impact:#ffcf33;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:manipulation;background:#222;font-family:ui-rounded,"SF Pro Rounded","PingFang SC",system-ui,sans-serif;color:var(--ink)}
    .phone{width:min(100vw,900px);height:min(100vh,560px);max-height:100vh;position:relative;overflow:hidden;background:linear-gradient(var(--wall) 0 53%, #b88763 53% 100%);box-shadow:0 0 0 1px rgba(255,255,255,.08)}.phone.shake{animation:screenShake .42s linear}.phone.flash:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--hit-x,50%) var(--hit-y,50%),rgba(255,255,255,.9),rgba(255,207,51,.35) 16%,transparent 42%);z-index:23;pointer-events:none;animation:flash .34s ease-out forwards}@keyframes flash{to{opacity:0;transform:scale(1.35)}}@keyframes screenShake{0%,100%{transform:translate(0,0) rotate(0)}12%{transform:translate(-12px,7px) rotate(-1deg)}28%{transform:translate(13px,-6px) rotate(1deg)}44%{transform:translate(-10px,-8px) rotate(-1deg)}60%{transform:translate(9px,6px) rotate(1deg)}78%{transform:translate(-5px,3px) rotate(-.5deg)}}

    /* 更真实一点的办公室 */
    .ceiling{position:absolute;left:0;right:0;top:0;height:8%;background:#eee8df;border-bottom:2px solid rgba(0,0,0,.08)}
    .light{position:absolute;top:2%;left:50%;transform:translateX(-50%);width:44%;height:18px;border-radius:20px;background:#fff9df;box-shadow:0 0 28px rgba(255,244,188,.55)}
    .back-wall{position:absolute;left:0;right:0;top:8%;height:45%;background:linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px) 0 0/55px 55px,linear-gradient(var(--wall),var(--wall2));border-bottom:7px solid #8d8176}
    .window{position:absolute;top:13%;left:7%;width:34%;height:20%;border:7px solid #f4efe6;background:linear-gradient(150deg,#a8d1e5,#d9eff9);box-shadow:0 10px 18px rgba(0,0,0,.12)}
    .window:before,.window:after{content:"";position:absolute;background:#f4efe6}.window:before{left:50%;top:0;width:5px;height:100%}.window:after{top:50%;left:0;height:5px;width:100%}
    .blind{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,.7);box-shadow:0 18px 0 rgba(255,255,255,.55),0 36px 0 rgba(255,255,255,.45),0 54px 0 rgba(255,255,255,.35)}
    .poster{position:absolute;right:7%;top:14%;width:33%;height:18%;background:#f8f3e8;border:6px solid #4f5963;box-shadow:0 9px 16px rgba(0,0,0,.14);padding:10px;text-align:center;font-weight:1000;color:#39404a;font-size:clamp(12px,3.6vw,16px)}
    .poster b{display:block;color:var(--red);font-size:1.4em;margin-bottom:3px}.poster:after{content:"APPROVED?";position:absolute;right:8px;bottom:7px;color:#d05041;font-size:10px;transform:rotate(-8deg)}
    .cabinet{position:absolute;right:4%;bottom:32%;width:70px;height:148px;background:#707b86;border-radius:4px;box-shadow:0 10px 20px rgba(0,0,0,.2)}
    .drawer{height:33.33%;border-bottom:2px solid #58616b;position:relative}.drawer:after{content:"";position:absolute;top:16px;left:22px;width:26px;height:5px;border-radius:9px;background:#cfd6dc}
    .plant{position:absolute;left:1%;bottom:33%;width:72px;height:130px;opacity:.95}.leaf{position:absolute;bottom:42px;width:25px;height:75px;background:#4b8f5b;border-radius:80% 20% 80% 20%;transform-origin:bottom}.l1{left:22px;transform:rotate(-28deg)}.l2{left:35px;transform:rotate(25deg);background:#5aa866}.l3{left:29px;transform:rotate(0)}.pot{position:absolute;bottom:0;left:18px;width:42px;height:45px;background:#a65e3c;border-radius:4px 4px 13px 13px}
    .floor{position:absolute;left:-12%;right:-12%;bottom:-3%;height:47%;background:repeating-linear-gradient(90deg,#a87551 0 42px,#956747 42px 84px);transform:perspective(260px) rotateX(18deg);transform-origin:bottom;opacity:.95}
    .rug{position:absolute;left:18%;right:18%;bottom:6%;height:14%;background:rgba(63,76,91,.22);border-radius:50%}

    .hud{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;z-index:10}.pill{background:rgba(255,255,255,.86);border:1px solid rgba(0,0,0,.12);border-radius:999px;padding:9px 12px;font-weight:1000;box-shadow:0 6px 14px rgba(0,0,0,.12);backdrop-filter:blur(5px);font-size:14px}
    .title-card,.end-card{position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;background:linear-gradient(rgba(245,238,225,.96),rgba(216,200,181,.96))}h1{margin:0 0 12px;font-size:42px;line-height:1.05}.subtitle{font-size:17px;line-height:1.6;max-width:330px;opacity:.82}button{border:0;border-radius:999px;background:var(--orange);color:white;font-weight:1000;font-size:20px;padding:16px 28px;margin-top:24px;box-shadow:0 8px 0 #a94d22;cursor:pointer}button:active{transform:translateY(5px);box-shadow:0 3px 0 #a94d22}.hint{margin-top:14px;font-size:13px;opacity:.65}.hidden{display:none!important}

    .game{position:absolute;inset:0;padding-top:22%}.desks{position:absolute;left:0;right:0;bottom:8%;height:54%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr;gap:clamp(10px,2.4vw,24px);padding:0 clamp(14px,4vw,42px);z-index:4}.hole{position:relative;display:flex;align-items:flex-end;justify-content:center}.desk{position:absolute;bottom:0;width:100%;height:42%;pointer-events:none;background:linear-gradient(#9c6743,#795034);border-radius:6px 6px 12px 12px;box-shadow:0 8px 0 var(--desk2),0 18px 24px var(--shadow);z-index:4;overflow:hidden}.desk:before{content:"";position:absolute;left:0;right:0;top:0;height:10px;background:#b47a52}.desk:after{content:"";position:absolute;right:13%;bottom:18%;width:44px;height:28px;background:var(--paper);box-shadow:-54px -10px 0 #e7eef2;transform:rotate(-4deg)}.keyboard{position:absolute;bottom:31%;right:14%;width:32%;height:9%;background:#2d333a;border-radius:4px;z-index:5;transform:skewX(-12deg)}.monitor{position:absolute;bottom:35%;left:10%;width:36%;height:31%;background:#2c3440;border:4px solid #191919;border-radius:5px;z-index:5}.monitor:before{content:"REV_09.ai";position:absolute;inset:5px;background:#b9d2dd;color:#30404b;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}.monitor:after{content:"";position:absolute;left:40%;bottom:-17px;width:22%;height:17px;background:#1b1b1b}

    .bro{position:absolute;bottom:28%;width:min(27vw,170px);height:min(35vw,220px);transform:translateY(260%);opacity:0;transition:transform .2s cubic-bezier(.2,1.5,.5,1),opacity .16s,filter .08s;z-index:6;display:flex;flex-direction:column;align-items:center;pointer-events:none;cursor:pointer}.bro.up{transform:translateY(0);opacity:1;pointer-events:auto}.bro.hit{animation:bonk .86s cubic-bezier(.18,1.8,.28,1);opacity:1;pointer-events:none;filter:saturate(.55) contrast(1.45) drop-shadow(0 0 22px rgba(230,95,72,.85))}.bro.vanish{transform:translateY(260%);opacity:0;pointer-events:none;transition:transform .28s ease-in,opacity .18s ease-in}@keyframes bonk{0%{transform:translateY(0) rotate(0) scale(1)}10%{transform:translateY(18px) rotate(-24deg) scale(.78)}24%{transform:translateY(-22px) rotate(22deg) scale(1.2)}40%{transform:translateY(8px) rotate(-18deg) scale(.9)}56%{transform:translateY(-9px) rotate(14deg) scale(1.1)}74%{transform:translateY(3px) rotate(-8deg) scale(.98)}100%{transform:translateY(0) rotate(0) scale(1)}}
    /* 按你发的参考图：椭圆脸、长鼻子、黑边手绘感、腮红、小耳朵、斜刘海 */
    .head{position:relative;width:74%;height:72%;background:var(--skin);border:3px solid #1e2119;border-radius:48% 46% 44% 42%/56% 54% 45% 44%;z-index:2;box-shadow:0 8px 0 rgba(0,0,0,.12);overflow:visible}.head:before,.head:after{content:"";position:absolute;top:38%;width:15px;height:24px;background:var(--skin);border:3px solid #1e2119;border-radius:50%;z-index:-1}.head:before{left:-13px}.head:after{right:-13px}.hair{position:absolute;top:-1px;right:8px;width:45%;height:35%;background:#2e2b20;border-radius:0 58% 0 88%;clip-path:polygon(6% 0,100% 0,92% 100%,20% 70%);box-shadow:inset 7px 0 0 rgba(255,255,255,.07),inset 15px 0 0 rgba(0,0,0,.15)}.eye{position:absolute;top:38%;width:6px;height:6px;background:#1e2119;border-radius:50%}.eye.left{left:28%}.eye.right{right:30%}.nose{position:absolute;left:46%;top:27%;width:20%;height:49%;background:linear-gradient(90deg,#b64c34 0 30%,var(--nose) 31% 100%);border:3px solid #1e2119;border-top:0;border-radius:45% 45% 50% 50%;transform:rotate(2deg)}.cheek{position:absolute;top:50%;width:17px;height:17px;background:var(--cheek);border-radius:50%;opacity:.85}.cheek.l{left:15%}.cheek.r{right:15%}.mouth{position:absolute;left:39%;bottom:15%;width:24%;height:10px;border-bottom:3px solid #1e2119;border-radius:0 0 99px 99px}.bro.hit .mouth{left:36%;bottom:12%;width:30%;height:20px;background:#24120f;border:3px solid #1e2119;border-radius:50%;box-shadow:inset 0 -5px #8f2d36}.body{margin-top:-5px;width:72%;height:46%;border-radius:16px 16px 10px 10px;background:linear-gradient(90deg,#2f68a0 0 24%,#f8fbff 24% 76%,#2f68a0 76% 100%);border:3px solid #25221e;position:relative;box-shadow:inset 0 10px rgba(255,255,255,.22)}.body:before,.body:after{content:"";position:absolute;top:12%;width:28%;height:52%;background:#2f68a0;border-bottom:3px solid #25221e}.body:before{left:-20%;border-radius:18px 0 12px 18px;transform:rotate(10deg)}.body:after{right:-20%;border-radius:0 18px 18px 12px;transform:rotate(-10deg)}.collar{position:absolute;top:0;left:27%;width:46%;height:24%;background:#fff;clip-path:polygon(0 0,50% 100%,100% 0,100% 42%,50% 100%,0 42%);z-index:2}.tie{position:absolute;top:10%;left:43%;width:14%;height:62%;background:#e75f4b;clip-path:polygon(50% 0,100% 35%,70% 100%,30% 100%,0 35%);z-index:3}.tag{position:absolute;top:-16px;left:50%;transform:translateX(-50%);background:#fff;border:2px solid #26211d;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:1000;white-space:nowrap;z-index:3}.damage{position:absolute;inset:0;opacity:0;pointer-events:none}.damage:before{content:"💢";position:absolute;right:-24px;top:-22px;font-size:28px;filter:drop-shadow(1px 1px white)}.damage:after{content:"💦";position:absolute;left:-26px;top:4px;font-size:24px;transform:rotate(-15deg);filter:drop-shadow(1px 1px white)}.bruise{position:absolute;width:19px;height:14px;background:#8578d4;border-radius:50%;left:58%;top:41%;transform:rotate(-20deg);opacity:.86}.bandage{position:absolute;width:32px;height:13px;background:#fff0bd;border:2px solid #1e2119;border-radius:9px;left:16%;top:23%;transform:rotate(-20deg)}.stars{position:absolute;top:-40px;left:50%;transform:translateX(-50%);color:#ffd33d;font-size:40px;text-shadow:1px 1px #633;white-space:nowrap}.bro.d1 .damage,.bro.d2 .damage,.bro.d3 .damage{opacity:1}.bro.d2 .mouth{border-bottom:0;border-top:3px solid #1e2119;bottom:12%;height:8px}.bro.d3 .eye.left,.bro.d3 .eye.right{width:16px;height:4px;border-radius:0;transform:rotate(35deg)}.bro.d3 .eye.right{transform:rotate(-35deg)}.bro.d1 .bruise{opacity:.75}.bro.d2 .head{transform:rotate(-4deg)}.bro.d2 .bruise{width:24px;height:17px}.bro.d3 .eye.left,.bro.d3 .eye.right{width:16px;height:4px;border-radius:0;transform:rotate(35deg)}.bro.d3 .eye.right{transform:rotate(-35deg)}.bro.d3 .nose{transform:rotate(-8deg);filter:saturate(.6)}.bro.d3 .head{background:#efd186;transform:rotate(6deg)}.bro.d3 .body{filter:brightness(.9)}.b1 .body{background:linear-gradient(90deg,#2f68a0 0 24%,#f8fbff 24% 76%,#2f68a0 76% 100%)}.b2 .body{background:linear-gradient(90deg,#3d7fbd 0 24%,#f8fbff 24% 76%,#3d7fbd 76% 100%)}.b3 .body{background:linear-gradient(90deg,#285987 0 24%,#f8fbff 24% 76%,#285987 76% 100%)}

    .hammer{position:absolute;left:0;top:0;width:132px;height:132px;z-index:25;pointer-events:none;transform:translate(-999px,-999px) rotate(-28deg);transform-origin:72% 78%;filter:drop-shadow(0 8px 5px rgba(0,0,0,.28));opacity:.98}
    .hammer .handle{position:absolute;left:72px;top:38px;width:20px;height:100px;background:linear-gradient(90deg,#7a4a28,#b27645,#6d3e22);border:3px solid #241a12;border-radius:10px;transform:rotate(36deg)}
    .hammer .head{position:absolute;left:20px;top:8px;width:92px;height:50px;background:linear-gradient(#aeb6bd,#6f7881);border:3px solid #222;border-radius:9px;transform:rotate(36deg);box-shadow:inset 0 5px rgba(255,255,255,.25)}
    .hammer .head:before,.hammer .head:after{content:"";position:absolute;top:9px;width:22px;height:28px;background:#818a92;border:3px solid #222;border-radius:6px}
    .hammer .head:before{left:-22px}.hammer .head:after{right:-22px}
    .hammer.swing{animation:hammerSwing .2s ease-out}
    @keyframes hammerSwing{0%{transform:var(--hammer-pos) rotate(-62deg) scale(1.18)}42%{transform:var(--hammer-pos) rotate(28deg) scale(.94)}68%{transform:var(--hammer-pos) rotate(8deg) scale(1.03)}100%{transform:var(--hammer-pos) rotate(-28deg) scale(1)}}
    .smash{position:absolute;z-index:24;pointer-events:none;width:112px;height:112px;transform:translate(-50%,-50%);animation:smash .32s ease-out forwards}
    .smash:before{content:"💥";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:86px;filter:drop-shadow(4px 4px white) drop-shadow(0 0 12px #ffcf33)}
    @keyframes smash{to{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
    .pop{position:absolute;z-index:20;font-weight:1000;font-size:34px;color:var(--red);text-shadow:2px 2px 0 #fff;pointer-events:none;animation:floatup .55s ease-out forwards}@keyframes floatup{to{transform:translateY(-45px) rotate(-8deg);opacity:0}}
  </style>
  <meta name="game-version" content="horizontal-three-workstations-random-vanish" />
</head>
<body>
  <main class="phone" id="phone">
    <div class="ceiling"><div class="light"></div></div><div class="back-wall"></div>
    <div class="window"><div class="blind"></div></div><div class="poster"><b>NO</b>LAST MINUTE<br/>REVISION</div>
    <div class="cabinet"><div class="drawer"></div><div class="drawer"></div><div class="drawer"></div></div>
    <div class="plant"><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="pot"></div></div>
    <div class="hud"><div class="pill">分数 <span id="score">0</span></div><div class="pill">时间 <span id="time">30</span>s</div><div class="pill">连击 <span id="combo">0</span></div></div>
    <section class="game"><div class="floor"></div><div class="rug"></div><div class="desks" id="desks"></div></section>
    <div class="hammer" id="hammer"><div class="handle"></div><div class="head"></div></div>
    <section class="title-card" id="start"><h1>暴打<br/>三兄弟</h1><div class="subtitle">横向三工位办公室版。三兄弟会从左到右轮流冒出来，用大锤子砸他们，会有夸张惨叫、闪光、震屏和受伤变化！</div><button id="startBtn">开始上班</button><div class="hint">手机直接点屏幕挥锤 · 无血腥纯恶搞</div></section>
    <section class="end-card hidden" id="end"><h1>下班！</h1><div class="subtitle" id="result"></div><button id="restartBtn">再暴打一次</button></section>
  </main>
  <script>
    const hammer=document.getElementById('hammer'),desks=document.getElementById('desks'),scoreEl=document.getElementById('score'),timeEl=document.getElementById('time'),comboEl=document.getElementById('combo'),startCard=document.getElementById('start'),endCard=document.getElementById('end'),result=document.getElementById('result'),phone=document.getElementById('phone');
    const roasts=['啊！！！','OUCH!!','救命!!','疼疼疼!','别打啦!','啊啊啊!'];let score=0,combo=0,timeLeft=30,running=false,gameTimer,spawnTimer,audioCtx,lastBroIndex=-1;const bros=[];
    function playHitSound(level=1){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const now=audioCtx.currentTime,osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),thud=audioCtx.createOscillator(),thudGain=audioCtx.createGain(),scream=audioCtx.createOscillator(),screamGain=audioCtx.createGain();osc.type='square';osc.frequency.setValueAtTime(320+level*70,now);osc.frequency.exponentialRampToValueAtTime(80,now+.16);gain.gain.setValueAtTime(.35,now);gain.gain.exponentialRampToValueAtTime(.001,now+.18);thud.type='sine';thud.frequency.setValueAtTime(82,now);thud.frequency.exponentialRampToValueAtTime(32,now+.28);thudGain.gain.setValueAtTime(.5,now);thudGain.gain.exponentialRampToValueAtTime(.001,now+.3);scream.type='sawtooth';scream.frequency.setValueAtTime(760+level*80,now+.03);scream.frequency.exponentialRampToValueAtTime(260,now+.62);screamGain.gain.setValueAtTime(.001,now);screamGain.gain.linearRampToValueAtTime(.18,now+.06);screamGain.gain.exponentialRampToValueAtTime(.001,now+.66);osc.connect(gain).connect(audioCtx.destination);thud.connect(thudGain).connect(audioCtx.destination);scream.connect(screamGain).connect(audioCtx.destination);osc.start(now);thud.start(now);scream.start(now+.03);osc.stop(now+.2);thud.stop(now+.32);scream.stop(now+.68)}catch(e){}}
    function makeBro(i){const hole=document.createElement('div');hole.className='hole';hole.addEventListener('pointerdown',e=>{const target=hole.querySelector('.bro');if(target&&target.classList.contains('up'))hitBro(e,target)});hole.innerHTML=`<div class="bro b${(i%3)+1}" data-damage="0"><div class="tag">${['大哥','二哥','三弟'][i%3]}</div><div class="head"><div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div><div class="damage"><div class="bruise"></div><div class="bandage"></div><div class="stars">✦✦</div></div></div><div class="body"><div class="collar"></div><div class="tie"></div></div></div><div class="monitor"></div><div class="keyboard"></div><div class="desk"></div>`;const bro=hole.querySelector('.bro');bro.addEventListener('pointerdown',e=>{e.stopPropagation();hitBro(e,bro)});desks.appendChild(hole);bros.push(bro)}for(let i=0;i<3;i++)makeBro(i);
    function startGame(){score=0;combo=0;timeLeft=30;lastBroIndex=-1;running=true;scoreEl.textContent=score;comboEl.textContent=combo;timeEl.textContent=timeLeft;startCard.classList.add('hidden');endCard.classList.add('hidden');bros.forEach(b=>{b.className=b.className.replace(/ up| hit| vanish| d1| d2| d3/g,'');b.dataset.damage=0});gameTimer=setInterval(()=>{timeLeft--;timeEl.textContent=timeLeft;if(timeLeft<=0)endGame()},1000);spawnLoop()}
    function spawnLoop(){if(!running)return;let pick=Math.floor(Math.random()*bros.length);if(bros.length>1&&pick===lastBroIndex)pick=(pick+1+Math.floor(Math.random()*(bros.length-1)))%bros.length;lastBroIndex=pick;showBro(bros[pick]);const delay=Math.max(520,1050-score*6);spawnTimer=setTimeout(spawnLoop,delay)}
    function showBro(bro){bros.forEach(b=>b.classList.remove('up','hit'));bro.classList.remove('vanish');bro.classList.add('up');const stay=Math.max(520,1200-score*5+Math.random()*500);setTimeout(()=>{if(running&&bro.classList.contains('up')&&!bro.classList.contains('hit')){bro.classList.remove('up');combo=0;comboEl.textContent=combo}},stay)}
    function hitBro(e,bro){showHammer(e.clientX,e.clientY);if(!running||!bro.classList.contains('up')||bro.classList.contains('hit')||bro.classList.contains('vanish'))return;combo++;score+=10+Math.min(combo*2,20);scoreEl.textContent=score;comboEl.textContent=combo;let d=Number(bro.dataset.damage||0)+1;if(d>3)d=3;bro.dataset.damage=d;bro.classList.remove('d1','d2','d3');bro.classList.add('d'+d,'hit');phone.style.setProperty('--hit-x',(e.clientX-phone.getBoundingClientRect().left)+'px');phone.style.setProperty('--hit-y',(e.clientY-phone.getBoundingClientRect().top)+'px');phone.classList.remove('shake','flash');void phone.offsetWidth;phone.classList.add('shake','flash');popText(e.clientX,e.clientY,roasts[Math.floor(Math.random()*roasts.length)]);playHitSound(d);if(navigator.vibrate)navigator.vibrate([70,30,70,30,90]);setTimeout(()=>phone.classList.remove('shake','flash'),460);setTimeout(()=>{bro.classList.add('vanish');bro.classList.remove('up','hit')},900)}
    function showHammer(x,y){const rect=phone.getBoundingClientRect();const px=x-rect.left-42,py=y-rect.top-104;hammer.style.setProperty('--hammer-pos',`translate(${px}px,${py}px)`);hammer.style.transform=`translate(${px}px,${py}px) rotate(-28deg)`;hammer.classList.remove('swing');void hammer.offsetWidth;hammer.classList.add('swing');const boom=document.createElement('div');boom.className='smash';boom.style.left=x-rect.left+'px';boom.style.top=y-rect.top+'px';phone.appendChild(boom);setTimeout(()=>boom.remove(),330)}
    function popText(x,y,text){const p=document.createElement('div'),rect=phone.getBoundingClientRect();p.className='pop';p.textContent=text;p.style.left=x-rect.left-35+'px';p.style.top=y-rect.top-20+'px';phone.appendChild(p);setTimeout(()=>p.remove(),600)}
    function endGame(){running=false;clearInterval(gameTimer);clearTimeout(spawnTimer);bros.forEach(b=>b.classList.remove('up','hit','vanish'));result.innerHTML=`你的最终分数是 <b>${score}</b><br>${score>450?'今日怨气清空，快乐夺回成功。':score>250?'三兄弟已受到职场震撼教育。':'还没打够，建议继续加班式输出。'}`;endCard.classList.remove('hidden')}
    document.getElementById('startBtn').addEventListener('click',startGame);document.getElementById('restartBtn').addEventListener('click',startGame);
  </script>
</body>
</html>
